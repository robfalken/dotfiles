set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'tmux-plugins/tmux-urlview'

# Bindings
bind r source-file ~/.tmux.conf
bind t new-window

# Options
set-option -g status-position top
set-option -g allow-rename off
set-option -g focus-events on # required by nvim

setw -g mouse on
setw -g base-index 1
setw -g pane-base-index 1
setw -g window-status-format ' #I:#W '

set -sg escape-time 1 # quicker responses
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# Rose Pine Dawn
base=#faf4ed
surface=#fffaf3
overlay=#f2e9e1
muted=#9893a5
subtle=#797593
text=#575279
love=#b4637a
gold=#ea9d34
rose=#d7827e
pine=#286983
foam=#56949f
iris=#907aa9
highlight_low=#f4ede8
highlight_med=#dfdad9
highlight_high=#cecacd

# Status bar
set -g status-style "bg=#{base},fg=#{muted}"

set -g status-left ""
set -g status-left-length 0

set -g status-right " #S "
set -g status-right-style "fg=#{highlight_high}"

set -g window-status-format '#I:#W'
set -g window-status-separator '#[fg=#cecacd] • '

set -g window-status-current-style "fg=#{pine}"
set -g window-status-current-format '#I#[fg=#{muted}]:#[fg=#{foam}]#W'

# Initialize TMUX plugin manager (keep this line at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
